packages:
  - "packages/*"

minimumReleaseAge: 10080
trustPolicy: no-downgrade
blockExoticSubdeps: true
minimumReleaseAgeExclude:
  - deslop-js
trustPolicyExclude:
  # semver@6.3.1 (a @babel/core transitive) predates npm provenance but was
  # published after provenance-attested semver 7.5.x, which no-downgrade
  # flags as a trust downgrade. It's a 2023 release of a boring classic.
  - semver

overrides:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.15
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.15
